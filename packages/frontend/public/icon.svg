<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Shield shape (main element) -->
  <g filter="url(#shadow)">
    <path d="M 100 35 
             L 140 50 
             Q 145 52 145 57
             L 145 100
             Q 145 130 100 155
             Q 55 130 55 100
             L 55 57
             Q 55 52 60 50
             Z" 
          fill="url(#shieldGradient)" 
          stroke="rgba(79, 70, 229, 0.3)" 
          stroke-width="2"/>
  </g>
  
  <!-- Lock body -->
  <rect x="85" y="95" width="30" height="35" rx="3" fill="url(#lockGradient)" filter="url(#glow)"/>
  
  <!-- Lock shackle -->
  <path d="M 90 95 
           L 90 85 
           Q 90 75 100 75 
           Q 110 75 110 85
           L 110 95" 
        fill="none" 
        stroke="url(#lockGradient)" 
        stroke-width="5" 
        stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="100" cy="107" r="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="98" y="107" width="4" height="12" rx="1" fill="rgba(255,255,255,0.9)"/>
  
  <!-- Decorative dots pattern (representing digital watermark) -->
  <g opacity="0.4">
    <circle cx="70" cy="65" r="2" fill="white"/>
    <circle cx="78" cy="68" r="1.5" fill="white"/>
    <circle cx="65" cy="75" r="1.5" fill="white"/>
    <circle cx="130" cy="65" r="2" fill="white"/>
    <circle cx="122" cy="68" r="1.5" fill="white"/>
    <circle cx="135" cy="75" r="1.5" fill="white"/>
    <circle cx="70" cy="140" r="2" fill="white"/>
    <circle cx="130" cy="140" r="2" fill="white"/>
  </g>
  
  <!-- Sparkle effect (top right) -->
  <g opacity="0.8">
    <path d="M 155 45 L 157 50 L 162 48 L 157 52 L 159 57 L 155 53 L 151 57 L 153 52 L 148 48 L 153 50 Z" 
          fill="white" 
          filter="url(#glow)"/>
  </g>
  
  <!-- Sparkle effect (bottom left) -->
  <g opacity="0.7">
    <path d="M 45 155 L 47 160 L 52 158 L 47 162 L 49 167 L 45 163 L 41 167 L 43 162 L 38 158 L 43 160 Z" 
          fill="white" 
          filter="url(#glow)"/>
  </g>
  
  <!-- Scan lines (representing digital processing) -->
  <g opacity="0.15">
    <line x1="55" y1="70" x2="145" y2="70" stroke="white" stroke-width="1"/>
    <line x1="55" y1="80" x2="145" y2="80" stroke="white" stroke-width="1"/>
    <line x1="55" y1="90" x2="145" y2="90" stroke="white" stroke-width="1"/>
    <line x1="55" y1="135" x2="145" y2="135" stroke="white" stroke-width="1"/>
    <line x1="55" y1="145" x2="145" y2="145" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Checkmark (for verification) -->
  <g opacity="0.6">
    <path d="M 115 118 L 120 123 L 130 110" 
          fill="none" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
</svg>