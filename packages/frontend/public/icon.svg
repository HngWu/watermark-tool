<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient for the Drop -->
    <linearGradient id="dropGradient" x1="256" y1="40" x2="256" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Highlight Gradient for Surface Reflection -->
    <linearGradient id="highlightGradient" x1="256" y1="80" x2="256" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.8" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    
    <!-- Refraction Gradient for Internal Depth -->
    <radialGradient id="refractionGradient" cx="200" cy="300" r="150" fx="200" fy="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.2" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <!-- Shadow Filter for Depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="20" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main Drop Shape -->
  <path d="M256 40C256 40 432 224 432 344C432 441.2 353.2 520 256 520C158.8 520 80 441.2 80 344C80 224 256 40 256 40Z" 
        fill="url(#dropGradient)" 
        filter="url(#dropShadow)" />

  <!-- Internal Refraction Layer -->
  <path d="M256 80C256 80 392 234 392 344C392 419.1 331.1 480 256 480C180.9 480 120 419.1 120 344C120 234 256 80 256 80Z" 
        fill="url(#refractionGradient)" />

  <!-- Embedded Shield Symbol (Forensic Layer) -->
  <path d="M256 220L310 240V300C310 340 256 370 256 370C256 370 202 340 202 300V240L256 220Z" 
        fill="white" 
        fill-opacity="0.3" />

  <!-- Top Surface Highlight -->
  <path d="M256 60C256 60 380 200 380 300C380 310 370 315 360 305C330 270 290 250 256 250C222 250 182 270 152 305C142 315 132 310 132 300C132 200 256 60 256 60Z" 
        fill="url(#highlightGradient)" />

  <!-- Frosted Rim Stroke -->
  <path d="M256 40C256 40 432 224 432 344C432 441.2 353.2 520 256 520C158.8 520 80 441.2 80 344C80 224 256 40 256 40Z" 
        stroke="white" 
        stroke-width="2" 
        stroke-opacity="0.1" 
        fill="none" />
</svg>